    h2 a { color: inherit; text-decoration: none; }
    h2 a:hover { text-decoration: underline; }
    .excerpt { margin: 0; color: #4c4c4c; text-align: justify; text-justify: inter-word; }
    footer { padding: 28px 0 50px; border-top: 1px solid #e8e8e8; color: #777; font-size: 12px; }
    @media (max-width: 520px) { header { padding-top: 38px; } .wrap { width: min(100% - 32px, 720px); } .intro { font-size: 22px; } }
