<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="placeholder">
  <title>placeholder</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: #171717; font-family: Georgia, "Times New Roman", serif; font-size: 19px; line-height: 1.75; }
    .wrap { width: min(100% - 48px, 720px); margin: 0 auto; }
    header { padding: 64px 0 42px; border-bottom: 1px solid #e8e8e8; }
    .site-name { color: inherit; font-size: 36px; font-weight: 700; letter-spacing: -0.035em; text-decoration: none; }
    .site-description { margin: 7px 0 0; color: #666; font-size: 15px; }
    article { padding: 66px 0 82px; }
    .back { display: inline-block; margin-bottom: 45px; color: #666; font-size: 13px; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .date { margin: 0 0 11px; color: #777; font-size: 12px; letter-spacing: .07em; text-transform: uppercase; }
    h1 { max-width: 650px; margin: 0 0 38px; font-size: clamp(40px, 7vw, 62px); line-height: 1.05; letter-spacing: -0.045em; }
    article > p { margin: 0 0 25px; text-align: justify; text-justify: inter-word; }
    figure { margin: 42px 0 40px; }
    .image-placeholder { display: grid; min-height: 310px; place-items: center; border: 1px solid #dedede; background: #f6f6f4; color: #8a8a86; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
    figcaption { margin-top: 11px; color: #777; font-size: 12px; line-height: 1.5; }
    @media (max-width: 520px) { .wrap { width: min(100% - 32px, 720px); } header { padding-top: 38px; } article { padding-top: 45px; } }
  </style>
</head>
<body>
  <header class="wrap">
    <a class="site-name" href="index.html">placeholder</a>
    <p class="site-description">placeholder</p>
  </header>
  <article class="wrap">
    <a class="back" href="index.html">placeholder</a>
    <p class="date">placeholder</p>
    <h1>placeholder</h1>
    <p>placeholder</p>
    <p>placeholder</p>
    <figure>
      <div class="image-placeholder" role="img" aria-label="placeholder">placeholder</div>
      <figcaption>placeholder</figcaption>
    </figure>
    <p>placeholder</p>
    <p>placeholder</p>
  </article>
</body>
</html>
